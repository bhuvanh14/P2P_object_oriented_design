<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become Tutor</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="container">
    <div class="card">
        <h2>Become a Tutor</h2>

        <div class="error" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/become_tutor}">
            <div class="form-group">
                <label for="subjects">Subjects</label>
                <input id="subjects" name="subjects" placeholder="e.g., Math, Physics" required>
            </div>

            <div class="form-group">
                <label for="contact">Contact Details</label>
                <input id="contact" name="contact" placeholder="Phone, email, etc." required>
            </div>

            <button type="submit">Save Tutor Details</button>
        </form>

        <p><a th:href="@{/dashboard}">Back to Dashboard</a></p>
    </div>
</div>
</body>
</html>
