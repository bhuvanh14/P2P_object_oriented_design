<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Available Tutoring Slots</title>
</head>
<body>
  <h2>Available Tutoring Slots</h2>

  {% if slots %}
    <table border="1" cellpadding="6" cellspacing="0">
      <thead>
        <tr>
          <th>#</th>
          <th>Tutor</th>
          <th>Subject</th>
          <th>Date</th>
          <th>Start</th>
          <th>End</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for s in slots %}
        <tr>
          <td>{{ loop.index }}</td>
          <td>{{ s.tutor_name }}</td>
          <td>{{ s.subject }}</td>
          <td>{{ s.date }}</td>
          <td>{{ s.start_time }}</td>
          <td>{{ s.end_time }}</td>
          <td><a href="{{ url_for('book_bp.book_slot', slot_id=s.id) }}">Book</a></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No available slots right now.</p>
  {% endif %}

  <p><a href="{{ url_for('profile_bp.dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
