name: Python CI - Build | Test | Coverage | Lint | Security

on:
  push:
    branches: [ main, develop, "feature/*", "user-management", "scheduler", "feedback", "admin" ]
  pull_request:
    branches: [ main ]

env:
  COVERAGE_FAIL_UNDER: 75
  PYLINT_THRESHOLD: 7.5
  REPORT_DIR: reports

jobs:
  build:
    name: Setup Python & Install Dependencies (cache pip)
    runs-on: ubuntu-latest
    outputs:
      python-version: "3.10"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          else
            # minimal install for CI tools if no requirements file
            pip install pytest pytest-cov pylint bandit
          fi

  build-test-coverage:
    name: Build | Test (with coverage)
    runs-on: ubuntu-latest
    needs: setup-and-install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (repeat for job isolation)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: Build (syntax check)
        run: |
          python -m compileall .

      - name: Run tests with coverage and enforce minimum coverage
        run: |
          mkdir -p ${{ env.REPORT_DIR }}
          # run pytest with coverage: xml + html and enforce coverage threshold
          pytest --maxfail=1 --disable-warnings -q --cov=. --cov-report=xml:${{ env.REPORT_DIR }}/coverage.xml --cov-report=html:${{ env.REPORT_DIR }}/coverage_html --cov-fail-under=${{ env.COVERAGE_FAIL_UNDER }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: ${{ env.REPORT_DIR }}

  lint:
    name: Lint (pylint) and enforce score >= threshold
    runs-on: ubuntu-latest
    needs: setup-and-install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run pylint and capture output
        run: |
          mkdir -p ${{ env.REPORT_DIR }}
          # build list of python files to lint (exclude tests and venv)
          FILES=$(git ls-files '*.py' | grep -v '^tests/' | grep -v '^venv/' || true)
          if [ -z "$FILES" ]; then
            echo "No python files found to lint."
            echo "0" > ${{ env.REPORT_DIR }}/pylint_score.txt
            touch ${{ env.REPORT_DIR }}/pylint_output.txt
            exit 0
          fi

          # run pylint and capture output (do not fail pipeline here; we will parse score)
          pylint $FILES > ${{ env.REPORT_DIR }}/pylint_output.txt 2>&1 || true

          # extract score (pattern: Your code has been rated at 8.35/10)
          SCORE=$(grep -Po 'rated at \K[0-9]+(?:\.[0-9]+)?(?=/10)' ${{ env.REPORT_DIR }}/pylint_output.txt || echo "0")
          echo "Pylint raw score: $SCORE"
          echo $SCORE > ${{ env.REPORT_DIR }}/pylint_score.txt

      - name: Fail if pylint score below threshold
        run: |
          SCORE=$(cat ${{ env.REPORT_DIR }}/pylint_score.txt || echo "0")
          python - <<PY
import sys
try:
    s = float("${SCORE}")
except:
    print("Failed to parse pylint score. Failing pipeline.")
    sys.exit(1)
threshold = float(${PYTHON:-${{ env.PYLINT_THRESHOLD }}})
if s < ${PYTHON:-${{ env.PYLINT_THRESHOLD }}}:
    print(f"Pylint score {s} is below required threshold ${PYTHON:-${{ env.PYLINT_THRESHOLD }}}. Failing.")
    sys.exit(1)
print(f"Pylint score {s} passes threshold.")
PY

      - name: Upload pylint output
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report
          path: ${{ env.REPORT_DIR }}/pylint_output.txt

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    needs: setup-and-install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install bandit and jq
        run: |
          python -m pip install --upgrade pip
          pip install bandit jq

      - name: Run bandit security scan (json + html)
        run: |
          mkdir -p ${{ env.REPORT_DIR }}
          bandit -r . -f json -o ${{ env.REPORT_DIR }}/bandit.json || true
          bandit -r . -f html -o ${{ env.REPORT_DIR }}/bandit.html || true
          echo "Bandit JSON saved to ${{ env.REPORT_DIR }}/bandit.json"
          # Count HIGH severity issues (if any) using jq
          HIGH_COUNT=$(jq '[.results[] | select(.issue_severity=="HIGH")] | length' ${{ env.REPORT_DIR }}/bandit.json 2>/dev/null || echo 0)
          echo "HIGH severity issues found by bandit: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Failing pipeline due to HIGH severity bandit issues."
            exit 1
          fi

      - name: Upload bandit reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: ${{ env.REPORT_DIR }}

  finalize:
    name: Finalize & deploy stub
    runs-on: ubuntu-latest
    needs: [build-test-coverage, lint, security]
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show artifact summary
        run: echo "All checks passed (build/test/coverage/lint/security). Artifacts available in each job."

      - name: (Optional) Deploy to staging (stub)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to staging (placeholder) - replace with real deploy commands."
