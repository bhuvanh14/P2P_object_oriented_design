<!DOCTYPE html>
<html>
<head><title>Add Slot</title></head>
<body>
  <h2>Add Available Slot</h2>
  {% if message %}<p style="color:green">{{ message }}</p>{% endif %}
  <form method="POST">
    <label>Date (YYYY-MM-DD)</label><br>
    <input type="date" name="date" required><br><br>

    <label>Start time</label><br>
    <input type="time" name="start_time" required><br><br>

    <label>End time</label><br>
    <input type="time" name="end_time" required><br><br>

    <label>Subject</label><br>
    <input type="text" name="subject"><br><br>

    <button type="submit">Add Slot</button>
  </form>

  <p><a href="{{ url_for('profile_bp.dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
