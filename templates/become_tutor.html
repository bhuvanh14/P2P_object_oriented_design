<!DOCTYPE html>
<html>
<head><title>Become a Tutor</title></head>
<body>
  <h2>Become a Tutor</h2>
  {% if message %}<p style="color:green">{{ message }}</p>{% endif %}
  <form method="POST">
    <label>Subjects (comma separated)</label><br>
    <input type="text" name="subjects" value="{{ user.subject or '' }}" required><br><br>

    <label>Contact</label><br>
    <input type="text" name="contact" value="{{ user.contact or '' }}"><br><br>

    <label>Short bio / experience</label><br>
    <textarea name="bio">{{ user.bio or '' }}</textarea><br><br>

    <button type="submit">Register as Tutor</button>
  </form>
  <p><a href="{{ url_for('profile_bp.dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
